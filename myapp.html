<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>webtokens</title>
        <style>
            h1 {
                font-weight: bold;
                color: #111111;
                text-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
                font-size: 40px;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            button {
                background-color: lightblue;
                color: black;
                font-weight: lighter;
                padding: 20px 30px; /* Shorthand for top/bottom 20px, left/right 30px */
                cursor: pointer;   /* Makes it obvious it's a clickable button */
                border: none;
                border-radius: 5px;
            }
            @keyframes smoothRotate {
                0% { 
                transform: rotate(10deg); 
            }
                100% { 
                transform: rotate(410deg); 
            }
            }

            button {
                /* Apply it to your button (takes 2 seconds, moves smoothly, loops forever) */
                transform-origin: center;
                animation: smoothRotate 0.5s linear infinite alternate;
            }
        </style>
    </head>
    <body>
        <h1>WebTokens</h1>
        <h3 id="demo">tokens: 0</h3>
        <p>In this website, you can press on a button to get a token.</p>
        
        <button onclick="myfun()">token</button>

        <script>
            let click = 0; // Start at 0 tokens
            
            function myfun() {
                click++; // Short for: click = click + 1;
                document.getElementById('demo').innerHTML = "tokens: " + click;

                if (click === 100) {
                   alert('Well Done! You Reached 100!');
                }
            }
        </script>
    </body>
</html>
